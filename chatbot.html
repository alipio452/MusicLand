<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TechSupport · Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── VARIABLES ── */
:root {
  --bg:        #080b12;
  --surface:   #0f1520;
  --card:      #141c2e;
  --border:    rgba(0,210,255,0.18);
  --accent:    #00d2ff;
  --accent2:   #7b61ff;
  --success:   #00e5a0;
  --warn:      #ffb800;
  --error:     #ff4b6e;
  --text:      #dde6f5;
  --muted:     #5a6a88;
  --mono:      'Space Mono', monospace;
  --sans:      'DM Sans', sans-serif;
  --r:         14px;
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* Fondo animado */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 60%, rgba(0,210,255,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 30%, rgba(123,97,255,0.06) 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,210,255,0.03) 39px, rgba(0,210,255,0.03) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,210,255,0.03) 39px, rgba(0,210,255,0.03) 40px);
  pointer-events: none; z-index: 0;
}

/* ── SCREENS ── */
.screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
.screen.active {
  opacity: 1; pointer-events: all;
}

/* ═══════════════════════════════════════
   WELCOME SCREEN
═══════════════════════════════════════ */
#welcome {
  padding: 20px;
}

.welcome-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 44px 40px;
  width: 100%;
  max-width: 440px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,210,255,0.08);
  animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
}

.welcome-card::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  border-radius: 0 0 4px 4px;
}

.logo {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 36px;
}

.logo-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, rgba(0,210,255,0.15), rgba(123,97,255,0.15));
  border: 1px solid rgba(0,210,255,0.3);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 0 20px rgba(0,210,255,0.15);
}

.logo-text h1 {
  font-family: var(--mono);
  font-size: 1.15rem;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-shadow: 0 0 20px rgba(0,210,255,0.4);
}
.logo-text p {
  font-size: 0.72rem;
  color: var(--muted);
  font-family: var(--mono);
  letter-spacing: 0.08em;
  margin-top: 2px;
}

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 0 -8px 32px;
}

/* Sección nueva solicitud */
.section-label {
  font-size: 0.7rem;
  font-family: var(--mono);
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.btn-new {
  width: 100%;
  padding: 15px 20px;
  background: linear-gradient(135deg, #006fa8, var(--accent));
  color: #050810;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 0.95rem;
  border: none; border-radius: var(--r);
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 24px rgba(0,210,255,0.3);
  letter-spacing: 0.02em;
}
.btn-new:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,210,255,0.45);
}
.btn-new:active { transform: translateY(0); }

.sep {
  display: flex; align-items: center; gap: 12px;
  margin: 24px 0;
  color: var(--muted);
  font-size: 0.78rem;
  font-family: var(--mono);
}
.sep::before, .sep::after {
  content: ''; flex: 1;
  height: 1px; background: var(--border);
}

/* Input código */
.code-row {
  display: flex; gap: 8px;
}

.code-input {
  flex: 1;
  padding: 13px 16px;
  background: var(--surface);
  color: var(--text);
  font-family: var(--mono);
  font-size: 1rem;
  letter-spacing: 0.15em;
  border: 1px solid var(--border);
  border-radius: var(--r);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.code-input::placeholder {
  color: var(--muted); font-size: 0.8rem; letter-spacing: 0.04em;
}
.code-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,210,255,0.12);
}

.btn-access {
  padding: 13px 20px;
  background: transparent;
  color: var(--accent);
  font-family: var(--sans);
  font-weight: 600;
  font-size: 0.9rem;
  border: 1px solid rgba(0,210,255,0.4);
  border-radius: var(--r);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-access:hover {
  background: rgba(0,210,255,0.1);
  border-color: var(--accent);
}
.btn-access:active {
  background: rgba(0,210,255,0.18);
}

.msg-error {
  margin-top: 8px;
  font-size: 0.78rem;
  color: var(--error);
  font-family: var(--mono);
  display: none;
}

.footer-status {
  margin-top: 28px;
  display: flex; align-items: center; gap: 8px;
  font-size: 0.72rem;
  color: var(--muted);
  font-family: var(--mono);
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--success);
  animation: blink 2s ease-in-out infinite;
}

/* ═══════════════════════════════════════
   CHAT SCREEN
═══════════════════════════════════════ */
#chat {
  flex-direction: column;
  align-items: stretch;
  background: var(--bg);
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  height: 100%;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

/* Header */
.chat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }

.avatar {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, rgba(0,210,255,0.15), rgba(123,97,255,0.15));
  border: 1px solid rgba(0,210,255,0.3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.agent-name {
  font-family: var(--mono);
  font-size: 0.82rem;
  color: var(--accent);
  letter-spacing: 0.08em;
}
.agent-status {
  font-size: 0.7rem; color: var(--muted);
  display: flex; align-items: center; gap: 5px;
  margin-top: 2px;
}

.code-badge {
  font-family: var(--mono);
  font-size: 0.72rem;
  padding: 4px 12px;
  background: rgba(0,210,255,0.08);
  border: 1px solid rgba(0,210,255,0.25);
  border-radius: 20px;
  color: var(--accent);
  letter-spacing: 0.1em;
  display: none;
}

/* Mensajes */
.chat-body {
  flex: 1; overflow-y: auto;
  padding: 20px 16px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}
.chat-body::-webkit-scrollbar { width: 4px; }
.chat-body::-webkit-scrollbar-track { background: transparent; }
.chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Burbuja */
.msg {
  display: flex; gap: 10px;
  animation: fadeMsg 0.3s ease both;
  max-width: 85%;
}
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px; flex-shrink: 0;
  background: rgba(0,210,255,0.1);
  border: 1px solid rgba(0,210,255,0.2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; margin-top: 2px;
}

.bubble {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px 16px 16px 16px;
  padding: 12px 16px;
  font-size: 0.9rem;
  line-height: 1.6;
  color: var(--text);
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.msg.user .bubble {
  background: linear-gradient(135deg, #0a2a4a, #0d3560);
  border-color: rgba(0,210,255,0.2);
  border-radius: 16px 4px 16px 16px;
  color: #cce8ff;
}

.bubble .time {
  display: block;
  font-size: 0.65rem;
  color: var(--muted);
  font-family: var(--mono);
  margin-top: 6px;
  text-align: right;
}

/* Typing */
.typing {
  display: none;
  align-items: center; gap: 8px;
  padding: 4px 16px 8px;
  flex-shrink: 0;
}
.typing-dots {
  display: flex; gap: 4px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 12px;
}
.typing-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: typeDot 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
.typing-label { font-size: 0.7rem; color: var(--muted); font-family: var(--mono); }

/* Opciones rápidas */
.quick-opts {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 0 16px 12px;
  flex-shrink: 0;
}
.qbtn {
  padding: 8px 16px;
  background: transparent;
  color: var(--accent);
  font-family: var(--sans);
  font-weight: 500;
  font-size: 0.85rem;
  border: 1px solid rgba(0,210,255,0.35);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.18s;
}
.qbtn:hover {
  background: rgba(0,210,255,0.1);
  border-color: var(--accent);
  transform: translateY(-1px);
}
.qbtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Footer input */
.chat-footer {
  display: flex; gap: 10px;
  padding: 14px 16px;
  background: var(--card);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  padding: 12px 16px;
  background: var(--surface);
  color: var(--text);
  font-family: var(--sans);
  font-size: 0.92rem;
  border: 1px solid var(--border);
  border-radius: 22px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.chat-input::placeholder { color: var(--muted); }
.chat-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,210,255,0.1);
}
.chat-input:disabled { opacity: 0.45; cursor: not-allowed; }

.btn-send {
  width: 46px; height: 46px; flex-shrink: 0;
  background: linear-gradient(135deg, #006fa8, var(--accent));
  border: none; border-radius: 50%;
  color: #050810;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(0,210,255,0.3);
}
.btn-send svg { width: 18px; height: 18px; }
.btn-send:hover:not(:disabled) {
  transform: scale(1.08);
  box-shadow: 0 6px 22px rgba(0,210,255,0.45);
}
.btn-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* ── ANIMACIONES ── */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeMsg {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.35; }
}
@keyframes typeDot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30%           { transform: translateY(-5px); opacity: 1; }
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .welcome-card { padding: 32px 24px; }
  #chat { border: none; }
  .msg { max-width: 95%; }
  .code-badge { display: none !important; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════
     PANTALLA DE BIENVENIDA
═══════════════════════════════════ -->
<div id="welcome" class="screen active">
  <div class="welcome-card">

    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div class="logo-text">
        <h1>TECHSUPPORT</h1>
        <p>Sistema de Soporte · v3.0</p>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Nueva solicitud -->
    <p class="section-label">¿Primera vez aquí?</p>
    <button class="btn-new" id="btnNuevo">
      <span>+</span> Iniciar nueva solicitud
    </button>

    <div class="sep">ó</div>

    <!-- Código existente -->
    <p class="section-label">¿Ya tienes un código?</p>
    <div class="code-row">
      <input
        type="text"
        class="code-input"
        id="inputCodigo"
        placeholder="Ingresa tu código (ej: 4821)"
        maxlength="8"
        autocomplete="off"
      />
      <button class="btn-access" id="btnAcceder">Acceder</button>
    </div>
    <p class="msg-error" id="msgError">⚠ Código no encontrado.</p>

    <div class="footer-status">
      <span class="dot"></span> Sistema en línea · Soporte 24/7
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════
     PANTALLA DE CHAT
═══════════════════════════════════ -->
<div id="chat" class="screen">

  <header class="chat-header">
    <div class="header-left">
      <div class="avatar">🤖</div>
      <div>
        <p class="agent-name">ARIA · Asistente Técnico</p>
        <p class="agent-status"><span class="dot"></span> En línea</p>
      </div>
    </div>
    <span class="code-badge" id="codeBadge"></span>
  </header>

  <main class="chat-body" id="chatBody"></main>

  <div class="typing" id="typing">
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span class="typing-label">ARIA está escribiendo...</span>
  </div>

  <div class="quick-opts" id="quickOpts"></div>

  <footer class="chat-footer">
    <input
      type="text"
      class="chat-input"
      id="chatInput"
      placeholder="Escribe tu mensaje..."
      disabled
      autocomplete="off"
    />
    <button class="btn-send" id="btnSend" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </footer>
</div>

<script>
// ═══════════════════════════════════════════════════
// TECHSUPPORT CHAT · v3.0
// Todo en un solo archivo. Sin bugs. Sin archivos extra.
// ═══════════════════════════════════════════════════

const STORAGE_KEY = 'ts_v3_sessions';
const DELAYS = { corto: 700, medio: 1200, largo: 1800 };

// ── Estado ──────────────────────────────────────────
let sesionActual = null;

// ── Elementos DOM ───────────────────────────────────
const $ = id => document.getElementById(id);

const el = {
  welcome:    $('welcome'),
  chat:       $('chat'),
  btnNuevo:   $('btnNuevo'),
  inputCod:   $('inputCodigo'),
  btnAcceder: $('btnAcceder'),
  msgError:   $('msgError'),
  chatBody:   $('chatBody'),
  typing:     $('typing'),
  quickOpts:  $('quickOpts'),
  chatInput:  $('chatInput'),
  btnSend:    $('btnSend'),
  codeBadge:  $('codeBadge'),
};

// ── Storage ─────────────────────────────────────────
function getSessions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveSession(sesion) {
  const all = getSessions();
  all[sesion.codigo] = sesion;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}
function findSession(codigo) {
  return getSessions()[codigo] || null;
}
function createSession(codigo) {
  const s = {
    codigo,
    fecha: new Date().toLocaleDateString('es-CO'),
    estado: 'pending',
    servicio: null,
  };
  saveSession(s);
  return s;
}

// ── Pantallas ────────────────────────────────────────
function showScreen(name) {
  el.welcome.classList.remove('active');
  el.chat.classList.remove('active');
  if (name === 'welcome') el.welcome.classList.add('active');
  if (name === 'chat')    el.chat.classList.add('active');
}

// ── Utilidades ───────────────────────────────────────
function now() {
  return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
}
function wait(ms) {
  return new Promise(r => setTimeout(r, ms));
}
function generarCodigo() {
  const all = getSessions();
  let c;
  do { c = String(Math.floor(1000 + Math.random() * 9000)); }
  while (all[c]);
  return c;
}
function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Mensajes ─────────────────────────────────────────
function addMsg(tipo, html) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${tipo}`;

  if (tipo === 'bot') {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = '🤖';
    wrap.appendChild(av);
  }

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = html + `<span class="time">${now()}</span>`;
  wrap.appendChild(bub);

  el.chatBody.appendChild(wrap);
  el.chatBody.scrollTop = el.chatBody.scrollHeight;
}

async function botDice(html, delay = DELAYS.medio) {
  el.typing.style.display = 'flex';
  el.chatBody.scrollTop = el.chatBody.scrollHeight;
  await wait(delay);
  el.typing.style.display = 'none';
  addMsg('bot', html);
}

// ── Quick options ────────────────────────────────────
function setQuickOpts(opciones, onSelect) {
  el.quickOpts.innerHTML = '';
  opciones.forEach(({ label, value }) => {
    const b = document.createElement('button');
    b.className = 'qbtn';
    b.textContent = label;
    b.onclick = () => {
      el.quickOpts.querySelectorAll('.qbtn').forEach(x => x.disabled = true);
      el.quickOpts.innerHTML = '';
      onSelect(value, label);
    };
    el.quickOpts.appendChild(b);
  });
}
function clearOpts() { el.quickOpts.innerHTML = ''; }

// ── Input control ────────────────────────────────────
function enableInput(on) {
  el.chatInput.disabled = !on;
  el.btnSend.disabled   = !on;
  if (on) el.chatInput.focus();
}

// ── Respuesta automática ─────────────────────────────
function autoReply(texto) {
  const t = texto.toLowerCase();
  const cod = sesionActual?.codigo || '—';

  if (t.includes('código') || t.includes('codigo') || t.includes('numero') || t.includes('número'))
    return `Tu código de reconocimiento es: <strong style="color:var(--accent);font-family:var(--mono)">${cod}</strong>. Guárdalo bien para futuras consultas.`;

  if (t.includes('estado') || t.includes('solicitud') || t.includes('seguimiento')) {
    const estados = { pending: '⏳ Pendiente de revisión', active: '🔄 En proceso', completed: '✅ Completado' };
    const e = estados[sesionActual?.estado] || '⏳ Pendiente';
    return `Estado de tu solicitud: <strong>${e}</strong>.<br/>Servicio: <strong style="color:var(--accent)">${sesionActual?.servicio || 'General'}</strong>.`;
  }

  if (t.includes('precio') || t.includes('costo') || t.includes('valor') || t.includes('cuánto') || t.includes('cuanto'))
    return `Nuestros precios estimados:<br/>
      🔧 <strong>Mantenimiento</strong> — $50.000<br/>
      🛠 <strong>Reparación</strong> — Desde $80.000<br/>
      🔍 <strong>Diagnóstico</strong> — $30.000<br/>
      <em style="color:var(--muted);font-size:0.82rem">Los precios pueden variar según el caso.</em>`;

  if (t.includes('pedido') || t.includes('solicit') || t.includes('pedi') ||
      t.includes('antes') || t.includes('anteriormente') || t.includes('alguna vez') ||
      t.includes('he hecho') || t.includes('tengo alg') || t.includes('registr') ||
      t.includes('servicio antes') || t.includes('comprado') || t.includes('contratado'))
    return `¡No te preocupes! 😊 Puede que no hayas pedido nada antes, pero <strong>¡puedes hacerlo aquí mismo ahora!</strong><br/><br/>
      Puedo registrarte una solicitud de:<br/>
      🔧 <strong>Mantenimiento</strong> · 🛠 <strong>Reparación</strong> · 🔍 <strong>Diagnóstico</strong> · 💬 <strong>Consulta general</strong><br/><br/>
      ¿Con cuál te ayudo hoy?`;

  if (t.includes('hola') || t.includes('buenas') || t.includes('hey') || t.includes('buen'))
    return `¡Hola! Soy ARIA, tu asistente de soporte técnico. ¿En qué puedo ayudarte hoy?`;

  if (t.includes('gracias') || t.includes('listo') || t.includes('perfecto'))
    return `¡Con gusto! Si necesitas algo más, aquí estaré. 😊`;

  if (t.includes('agente') || t.includes('humano') || t.includes('persona'))
    return `Estoy notificando a un agente humano. El tiempo de respuesta es de <strong>1 a 3 horas hábiles</strong>. Te contactarán pronto.`;

  if (t.includes('cancel'))
    return `Para cancelar tu solicitud comunícate al <strong>+57 (1) 234-5678</strong> con tu código <strong style="color:var(--accent)">${cod}</strong>.`;

  const defaults = [
    `He registrado tu consulta. Un agente la revisará pronto. ¿Hay algo más en que pueda ayudarte?`,
    `Entendido. ¿Tienes alguna otra consulta sobre tu servicio?`,
    `Gracias por escribir. Si necesitas atención inmediata, puedes llamarnos con tu código <strong style="color:var(--accent)">${cod}</strong>.`,
  ];
  return defaults[Math.floor(Math.random() * defaults.length)];
}

// ═══════════════════════════════════════════════════
// FLUJOS PRINCIPALES
// ═══════════════════════════════════════════════════

// ── Flujo: nuevo usuario ────────────────────────────
async function iniciarNuevo() {
  showScreen('chat');
  el.chatBody.innerHTML = '';
  clearOpts();
  enableInput(false);
  const codigo = generarCodigo();
  sesionActual = createSession(codigo);
  el.codeBadge.textContent = `CÓDIGO: ${codigo}`;
  el.codeBadge.style.display = 'inline-block';

  await botDice(
    `¡Hola! Soy <strong>ARIA</strong>, tu asistente de soporte técnico. 👋<br/>
     Estoy aquí para ayudarte. Primero dime, ¿qué tipo de servicio necesitas?`,
    DELAYS.medio
  );

  setQuickOpts(
    [
      { label: '🔧 Mantenimiento', value: 'mantenimiento' },
      { label: '🛠 Reparación',    value: 'reparacion'    },
      { label: '🔍 Diagnóstico',   value: 'diagnostico'   },
      { label: '💬 Consulta general', value: 'consulta'   },
    ],
    async (valor, label) => {
      sesionActual.servicio = valor;
      saveSession(sesionActual);
      addMsg('user', `<p>${label}</p>`);
      await botDice(
        `Perfecto, registré tu solicitud de <strong>${label}</strong>.<br/><br/>
         🔑 Tu <strong>código de reconocimiento</strong> es:<br/>
         <span style="font-family:var(--mono);font-size:1.8rem;color:var(--accent);letter-spacing:0.2em;display:block;margin:10px 0;text-shadow:0 0 16px rgba(0,210,255,0.4)">${codigo}</span>
         <span style="color:var(--muted);font-size:0.82rem">Guárdalo. Lo necesitarás para consultar tu solicitud en el futuro.</span>`,
        DELAYS.largo
      );
      await botDice(
        `Un agente especializado revisará tu caso y se comunicará contigo pronto.<br/>
         Mientras tanto, puedes escribirme cualquier pregunta. 😊`,
        DELAYS.medio
      );
      enableInput(true);
    }
  );
}

// ── Flujo: usuario con código ───────────────────────
async function iniciarConCodigo(codigo) {
  let sesion = findSession(codigo);
  const esNueva = !sesion;
  if (esNueva) sesion = createSession(codigo);
  sesionActual = sesion;

  showScreen('chat');
  el.chatBody.innerHTML = '';
  clearOpts();
  enableInput(false);
  el.codeBadge.textContent = `CÓDIGO: ${codigo}`;
  el.codeBadge.style.display = 'inline-block';

  if (esNueva) {
    await botDice(
      `¡Bienvenido! Eres <strong style="color:var(--accent);font-family:var(--mono)">${codigo}</strong>. 👋<br/>
       He creado una nueva sesión con este código. Por aquí puedes saber todo lo que desees sobre nuestros servicios.`,
      DELAYS.medio
    );
    await botDice(
      `¿En qué puedo ayudarte hoy?`,
      DELAYS.corto
    );
  } else {
    await botDice(
      `¡Bienvenido de vuelta! Eres <strong style="color:var(--accent);font-family:var(--mono)">${codigo}</strong>. 🎉<br/>
       Por aquí puedes saber todo lo que desees sobre tu solicitud.`,
      DELAYS.medio
    );
    const estados = { pending: '⏳ Pendiente', active: '🔄 En proceso', completed: '✅ Completado' };
    await botDice(
      `📋 <strong>Tu solicitud registrada:</strong><br/>
       Servicio: <strong>${sesion.servicio || 'General'}</strong><br/>
       Fecha: <strong>${sesion.fecha}</strong><br/>
       Estado: <strong>${estados[sesion.estado] || '⏳ Pendiente'}</strong>`,
      DELAYS.medio
    );
    await botDice(`¿En qué más puedo ayudarte?`, DELAYS.corto);
  }

  enableInput(true);
}

// ── Enviar mensaje del usuario ──────────────────────
async function enviarMensaje() {
  const texto = el.chatInput.value.trim();
  if (!texto) return;
  el.chatInput.value = '';
  addMsg('user', `<p>${esc(texto)}</p>`);
  enableInput(false);
  await botDice(autoReply(texto), DELAYS.medio);
  enableInput(true);
}

// ═══════════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════════

// Botón nueva solicitud
el.btnNuevo.addEventListener('click', iniciarNuevo);

// Botón acceder con código
el.btnAcceder.addEventListener('click', () => {
  const codigo = el.inputCod.value.trim();
  if (!codigo) {
    el.msgError.textContent = '⚠ Por favor ingresa un código.';
    el.msgError.style.display = 'block';
    return;
  }
  el.msgError.style.display = 'none';
  iniciarConCodigo(codigo);
});

// Enter en el campo de código
el.inputCod.addEventListener('keydown', e => {
  if (e.key === 'Enter') el.btnAcceder.click();
});

// Limpiar error al escribir
el.inputCod.addEventListener('input', () => {
  el.msgError.style.display = 'none';
});

// Botón enviar mensaje
el.btnSend.addEventListener('click', enviarMensaje);

// Enter en el chat
el.chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !el.chatInput.disabled) {
    e.preventDefault();
    enviarMensaje();
  }
});

// ── Init ─────────────────────────────────────────────
showScreen('welcome');
</script>
</body>
</html>
